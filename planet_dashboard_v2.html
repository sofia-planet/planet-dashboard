<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLANET Style Collective Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--deep:#2C1F1A;--gold:#B8936A;--cream:#F7F3EE;--stone:#9E8E82;--border:#E5DDD5;--white:#FDFBF9;--green:#4A7C59;--red:#8B3A3A;--blue:#3A5A8B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'Montserrat',sans-serif;color:var(--deep);min-height:100vh;}
header{background:var(--deep);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;}
.logo img{height:44px;filter:brightness(0) invert(1);}
.hdr{text-align:right;}
.hdr-tag{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);}
.hdr-date{font-size:10px;letter-spacing:0.1em;color:var(--stone);margin-top:3px;}
main{padding:28px 40px;max-width:1400px;margin:0 auto;}
.tab-nav{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border);align-items:center;}
.tab-btn{padding:10px 24px;font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--stone);cursor:pointer;margin-bottom:-1px;transition:all 0.2s;}
.tab-btn.active{color:var(--deep);border-bottom-color:var(--gold);font-weight:600;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.sec-title{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--stone);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
/* OVERVIEW */
.top-row{display:grid;grid-template-columns:240px 1fr;gap:20px;margin-bottom:20px;}
.circle-card{background:var(--deep);padding:28px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.cw{position:relative;width:140px;height:140px;margin-bottom:16px;}
.cw svg{width:140px;height:140px;transform:rotate(-90deg);}
.ci{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.cn{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;color:var(--white);line-height:1;}
.cl{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-top:2px;}
.pname{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--white);margin-bottom:4px;}
.pbadge{display:inline-block;padding:2px 10px;background:rgba(184,147,106,0.15);border:1px solid rgba(184,147,106,0.3);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.plabel{font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--stone);margin-bottom:6px;}
.gtext{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--stone);}
.gtext span{color:var(--gold);}
.stats-card{background:var(--white);border:1px solid var(--border);padding:20px 24px;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);}
.si{padding:12px 16px;border-right:1px solid var(--border);text-align:center;}
.si:last-child{border-right:none;}
.sn{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;line-height:1;margin-bottom:4px;}
.sl{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--stone);}
.g{color:var(--gold);}.gr{color:var(--green);}.b{color:var(--blue);}.r{color:var(--red);}
.pipe-card{background:var(--white);border:1px solid var(--border);padding:20px 24px;margin-bottom:20px;}
.pipe{display:grid;grid-template-columns:repeat(5,1fr);}
.ps{padding:0 6px;position:relative;}
.ps::after{content:'→';position:absolute;right:-8px;top:16px;color:var(--border);font-size:13px;}
.ps:last-child::after{display:none;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:7px;border-bottom:2px solid var(--border);}
.ph.ap{border-bottom-color:var(--green);}.ph.cs{border-bottom-color:var(--blue);}
.ph.in{border-bottom-color:var(--gold);}.ph.co{border-bottom-color:var(--stone);}.ph.pa{border-bottom-color:var(--red);}
.phn{font-size:7px;letter-spacing:0.08em;text-transform:uppercase;color:var(--stone);}
.phc{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:500;}
.chip{padding:3px 7px;background:var(--cream);border:1px solid var(--border);font-size:9px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
.chip.gr{background:rgba(74,124,89,0.08);border-color:rgba(74,124,89,0.2);}
.chip.g{background:rgba(184,147,106,0.08);border-color:rgba(184,147,106,0.2);}
.chip.b{background:rgba(58,90,139,0.08);border-color:rgba(58,90,139,0.2);}
.chip.r{background:rgba(139,58,58,0.08);border-color:rgba(139,58,58,0.2);}
.chip-sub{font-size:8px;color:var(--stone);display:block;margin-top:1px;}
.more{padding:3px 7px;border:1px dashed var(--border);font-size:8px;color:var(--stone);text-align:center;letter-spacing:0.1em;text-transform:uppercase;}
.bot-row{display:grid;grid-template-columns:1fr 320px;gap:20px;}
.up-card{background:var(--white);border:1px solid var(--border);padding:20px 24px;}
.act-card{background:var(--white);border:1px solid var(--border);padding:20px 18px;}
.ai{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.ai:last-child{border-bottom:none;}
.adot{width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:4px;flex-shrink:0;}
.adot.gr{background:var(--green);}.adot.b{background:var(--blue);}.adot.r{background:var(--red);}.adot.st{background:var(--stone);}
.atxt{font-size:10px;color:var(--deep);line-height:1.5;}
.atime{font-size:8px;color:var(--stone);margin-top:2px;}
/* CONTACTS */
.dtw{background:var(--white);border:1px solid var(--border);overflow:hidden;}
.dth{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
.dfilt{display:flex;gap:5px;flex-wrap:wrap;}
.fpill{padding:4px 11px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;border:1px solid var(--border);background:transparent;font-family:'Montserrat',sans-serif;cursor:pointer;color:var(--stone);transition:all 0.15s;}
.fpill.active{background:var(--deep);color:var(--white);border-color:var(--deep);}
.dsrch{border:1px solid var(--border);padding:6px 12px;font-family:'Montserrat',sans-serif;font-size:10px;color:var(--deep);background:var(--cream);outline:none;width:200px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--cream);}
th{padding:9px 14px;font-size:8px;letter-spacing:0.13em;text-transform:uppercase;color:var(--stone);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 14px;font-size:10px;color:var(--deep);border-bottom:1px solid var(--border);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(184,147,106,0.04);}
.spill{display:inline-block;padding:2px 7px;font-size:8px;letter-spacing:0.08em;text-transform:uppercase;}
.spill.ap{background:rgba(74,124,89,0.12);color:var(--green);border:1px solid rgba(74,124,89,0.2);}
.spill.cs{background:rgba(58,90,139,0.12);color:var(--blue);border:1px solid rgba(58,90,139,0.2);}
.spill.in{background:rgba(184,147,106,0.12);color:var(--gold);border:1px solid rgba(184,147,106,0.2);}
.spill.co{background:rgba(158,142,130,0.1);color:var(--stone);border:1px solid rgba(158,142,130,0.2);}
.spill.pa{background:rgba(139,58,58,0.1);color:var(--red);border:1px solid rgba(139,58,58,0.2);}
/* STATS */
.sh{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.sb{background:var(--white);border:1px solid var(--border);padding:18px 20px;text-align:center;}
.sbn{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;line-height:1;margin-bottom:5px;}
.sbl{font-size:9px;letter-spacing:0.13em;text-transform:uppercase;color:var(--stone);}
.sr2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cc{background:var(--white);border:1px solid var(--border);padding:20px 24px;}
.fr{margin-bottom:12px;}
.frl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;}
.fbo{height:7px;background:var(--cream);border-radius:1px;overflow:hidden;}
.fbi{height:100%;border-radius:1px;}
/* LOADING */
.loading{text-align:center;padding:60px;color:var(--stone);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;}
.refresh-btn{margin-left:auto;background:transparent;border:1px solid rgba(184,147,106,0.4);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:0.13em;text-transform:uppercase;padding:4px 12px;cursor:pointer;}
.refresh-btn:hover{background:rgba(184,147,106,0.1);}
</style>
</head>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
var AT_TOKEN = 'pattCK8tOv3M4b3l0.68863e0f8722856c54edd95487612decea5f8f299578597572fa348abf28ad83';
var BASE_ID  = 'appTCR9CFFn3y2Lgq';
var TABLE_ID = 'tblku4UydCySa4fvd';
var F = {
  name:'fldlwjCtxUwD2OtaS', status:'fldNQrpQMJCiwE1Tr',
  email:'fldt5FDjRt9QIQSwX', location:'fld11DfUijW5i6RVZ',
  channel:'fld0MRgRZgHc5I6sv', date:'fldp648BxV5MKWA1N', notes:'fldBoECgjy8cQMABM'
};

var ALL = [];
var curFilter = 'all', curQ = '';

// ── FETCH ───────────────────────────────────────────────────────
async function fetchAllRecords() {
  var all = [], offset = null;
  do {
    var atUrl = 'https://api.airtable.com/v0/' + BASE_ID + '/' + TABLE_ID + '?pageSize=100' + (offset ? '&offset=' + offset : '');
    var url = 'https://corsproxy.io/?' + encodeURIComponent(atUrl);
    var resp = await fetch(url, { headers: { Authorization: 'Bearer ' + AT_TOKEN } });
    var data = await resp.json();
    if (data.records) all = all.concat(data.records);
    offset = data.offset || null;
  } while (offset);
  return all;
}

function statusKey(s) {
  if (s === 'Active Partner') return 'ap';
  if (s === 'Call Scheduled') return 'cs';
  if (s === 'Interested') return 'in';
  if (s === 'Passed') return 'pa';
  return 'co';
}
function statusLabel(s) {
  var m = {'Active Partner':'Active Partner','Call Scheduled':'Call Scheduled','Interested':'Interested','Contacted':'Contacted','Passed':'Passed'};
  return m[s] || s;
}

// ── LOAD ────────────────────────────────────────────────────────
async function loadData() {
  var btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ Loading…'; btn.disabled = true;

  var records = await fetchAllRecords();

  var rawAll = records.map(function(r) {
    return {
      name: r.fields[F.name] || '',
      status: (r.fields[F.status] && r.fields[F.status].name) ? r.fields[F.status].name : (r.fields[F.status] || 'Contacted'),
      email: r.fields[F.email] || '',
      location: r.fields[F.location] || '',
      channel: (r.fields[F.channel] && r.fields[F.channel].name) ? r.fields[F.channel].name : (r.fields[F.channel] || ''),
      date: r.fields[F.date] || '',
      note: (r.fields[F.notes] && r.fields[F.notes].name) ? r.fields[F.notes].name : (r.fields[F.notes] || '')
    };
  });

  // Deduplicate - keep record with most fields filled in
  var nameMap = {};
  rawAll.forEach(function(c) {
    var existing = nameMap[c.name];
    if (!existing) {
      nameMap[c.name] = c;
    } else {
      // Prefer record with more data (notes, location, etc)
      var existingScore = (existing.note?1:0) + (existing.location?1:0) + (existing.email?1:0);
      var newScore = (c.note?1:0) + (c.location?1:0) + (c.email?1:0);
      // Also prefer non-contacted status
      var statusRank = {'Active Partner':5,'Call Scheduled':4,'Interested':3,'Contacted':1,'Passed':2};
      var existingRank = statusRank[existing.status] || 1;
      var newRank = statusRank[c.status] || 1;
      if (newRank > existingRank || (newRank === existingRank && newScore > existingScore)) {
        nameMap[c.name] = c;
      }
    }
  });
  ALL = Object.values(nameMap);

  renderOverview();
  renderStats();
  if (document.getElementById('tab-contacts').classList.contains('active')) renderContacts();

  document.getElementById('btn-contacts').textContent = 'All Contacts (' + ALL.length + ')';
  btn.textContent = '↻ Refresh'; btn.disabled = false;
}

// ── OVERVIEW ────────────────────────────────────────────────────
function renderOverview() {
  var counts = {ap:0,cs:0,in:0,co:0,pa:0};
  ALL.forEach(function(c) { counts[statusKey(c.status)]++; });
  var total = ALL.length;
  var partners = ALL.filter(function(c){return c.status==='Active Partner';});
  var calls = ALL.filter(function(c){return c.status==='Call Scheduled';});
  var intList = ALL.filter(function(c){return c.status==='Interested';});
  var passedList = ALL.filter(function(c){return c.status==='Passed';});
  var contacted = ALL.filter(function(c){return c.status==='Contacted';});

  var partnerChips = partners.map(function(p){
    return '<div class="pname">'+p.name+'</div><div class="pbadge">Founding Partner &middot; 20%</div>';
  }).join('');

  var callChips = calls.slice(0,5).map(function(c){
    return '<div class="chip b">'+c.name+'<span class="chip-sub">'+c.note.substring(0,50)+'</span></div>';
  }).join('');

  var intChips = intList.slice(0,5).map(function(c){
    return '<div class="chip g">'+c.name+'</div>';
  }).join('') + (intList.length > 5 ? '<div class="more">+ '+(intList.length-5)+' more</div>' : '');

  var passChips = passedList.slice(0,4).map(function(c){
    return '<div class="chip r">'+c.name+'</div>';
  }).join('');

  var contChips = contacted.slice(0,3).map(function(c){
    return '<div class="chip">'+c.name+'</div>';
  }).join('') + '<div class="more">+ '+(contacted.length - 3)+' more</div>';

  var upcomingHTML = calls.length === 0
    ? '<div style="font-size:9px;color:var(--stone);padding:8px 0">No calls scheduled</div>'
    : calls.map(function(c){
        return '<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-left:2px solid var(--blue);background:var(--cream);margin-bottom:4px">'
          +'<div style="font-size:8px;color:var(--stone);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;margin-top:2px;min-width:30px">Call</div>'
          +'<div><div style="font-size:10px;font-weight:600;color:var(--deep);margin-bottom:1px">'+c.name+'</div>'
          +'<div style="font-size:8px;color:var(--stone)">'+c.note.substring(0,60)+'</div></div></div>';
      }).join('');

  // Recent activity
  var recent = ALL.filter(function(c){return c.date;})
    .sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,7);
  var actHTML = recent.map(function(c){
    var dotCls = c.status==='Active Partner'?'gr':c.status==='Interested'||c.status==='Call Scheduled'?'b':c.status==='Passed'?'r':'st';
    return '<div class="ai"><div class="adot '+dotCls+'"></div><div><div class="atxt"><strong>'+c.name+'</strong>'
      +(c.note?' &mdash; '+c.note.substring(0,60):'')+'</div><div class="atime">'+c.date+'</div></div></div>';
  }).join('');

  var offset = Math.round(377 - (377 * (counts.ap / 10)));

  document.getElementById('tab-overview').innerHTML =
    '<div class="top-row">'
      +'<div class="circle-card">'
        +'<div class="cw"><svg viewBox="0 0 140 140"><circle fill="none" stroke="rgba(184,147,106,0.2)" stroke-width="6" cx="70" cy="70" r="60"/>'
        +'<circle fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="'+offset+'" cx="70" cy="70" r="60"/></svg>'
        +'<div class="ci"><div class="cn">'+counts.ap+'</div><div class="cl">Partner'+(counts.ap!==1?'s':'')+'</div></div></div>'
        +'<div class="plabel">Active Founding Partner'+(counts.ap!==1?'s':'')+'</div>'
        +partnerChips
        +'<div class="gtext" style="margin-top:8px">Goal: <span>10 partners</span> by June 30</div>'
      +'</div>'
      +'<div class="stats-card"><div class="sec-title">Pipeline Overview</div>'
        +'<div class="sg">'
          +'<div class="si"><div class="sn g">'+total+'</div><div class="sl">Total Outreach</div></div>'
          +'<div class="si"><div class="sn b">'+(counts.cs+counts.in)+'</div><div class="sl">Interested / Applied</div></div>'
          +'<div class="si"><div class="sn gr">'+counts.ap+'</div><div class="sl">Active Partners</div></div>'
          +'<div class="si"><div class="sn r">'+counts.pa+'</div><div class="sl">Passed / Declined</div></div>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div class="pipe-card"><div class="sec-title">Sales Pipeline</div>'
      +'<div class="pipe">'
        +'<div class="ps"><div class="ph ap"><span class="phn">Active Partner</span><span class="phc gr">'+counts.ap+'</span></div>'+partnerChips.replace(/pname/g,'chip gr').replace(/pbadge/g,'chip-sub')+'</div>'
        +'<div class="ps"><div class="ph cs"><span class="phn">Call Scheduled</span><span class="phc b">'+counts.cs+'</span></div>'+callChips+'</div>'
        +'<div class="ps"><div class="ph in"><span class="phn">Interested</span><span class="phc g">'+counts.in+'</span></div>'+intChips+'</div>'
        +'<div class="ps"><div class="ph co"><span class="phn">Contacted</span><span class="phc">'+counts.co+'</span></div>'+contChips+'</div>'
        +'<div class="ps"><div class="ph pa"><span class="phn">Passed</span><span class="phc r">'+counts.pa+'</span></div>'+passChips+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="bot-row">'
      +'<div class="up-card"><div class="sec-title">Upcoming Calls</div>'+upcomingHTML+'</div>'
      +'<div class="act-card"><div class="sec-title">Recent Activity</div>'+actHTML+'</div>'
    +'</div>';
}

// ── CONTACTS ────────────────────────────────────────────────────
function renderContacts() {
  var filtered = ALL.filter(function(c) {
    var ms = curFilter === 'all' || statusKey(c.status) === curFilter;
    var q = curQ.toLowerCase();
    var mq = !q || c.name.toLowerCase().indexOf(q)>-1 || c.email.toLowerCase().indexOf(q)>-1 || (c.location||'').toLowerCase().indexOf(q)>-1;
    return ms && mq;
  });

  var counts = {all:ALL.length,ap:0,cs:0,in:0,co:0,pa:0};
  ALL.forEach(function(c){counts[statusKey(c.status)]++;});

  var rows = filtered.map(function(c){
    var sk = statusKey(c.status);
    return '<tr><td><strong>'+c.name+'</strong></td>'
      +'<td style="color:var(--stone);font-size:9px">'+(c.email||'&mdash;')+'</td>'
      +'<td style="color:var(--stone)">'+(c.location||'&mdash;')+'</td>'
      +'<td><span class="spill '+sk+'">'+statusLabel(c.status)+'</span></td>'
      +'<td style="color:var(--stone)">'+c.date+'</td>'
      +'<td style="color:var(--stone);font-size:9px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.note+'">'+c.note+'</td></tr>';
  }).join('') || '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--stone)">No contacts match</td></tr>';

  var pills = [
    {k:'all',label:'All ('+counts.all+')'},
    {k:'ap',label:'Partners ('+counts.ap+')',style:'color:var(--green)'},
    {k:'cs',label:'Call Scheduled ('+counts.cs+')',style:'color:var(--blue)'},
    {k:'in',label:'Interested ('+counts.in+')',style:'color:var(--gold)'},
    {k:'co',label:'Contacted ('+counts.co+')'},
    {k:'pa',label:'Passed ('+counts.pa+')',style:'color:var(--red)'}
  ].map(function(p){
    return '<button class="fpill'+(curFilter===p.k?' active':'')+'" '+(p.style?'style="'+p.style+'"':'')+' onclick="filterTable(\''+p.k+'\')">'+p.label+'</button>';
  }).join('');

  document.getElementById('tab-contacts').innerHTML =
    '<div class="dtw">'
      +'<div class="dth">'
        +'<div class="dfilt">'+pills+'</div>'
        +'<input class="dsrch" type="text" placeholder="Search name, email, location&hellip;" value="'+curQ+'" oninput="searchTable(this.value)"/>'
      +'</div>'
      +'<table><thead><tr><th>Name</th><th>Email</th><th>Location</th><th>Status</th><th>Date</th><th>Notes</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table>'
    +'</div>';
}

// ── STATS ────────────────────────────────────────────────────────
function renderStats() {
  var counts = {ap:0,cs:0,in:0,co:0,pa:0};
  ALL.forEach(function(c){counts[statusKey(c.status)]++;});
  var total = ALL.length;
  var responses = counts.ap + counts.cs + counts.in;
  var rr = total > 0 ? Math.round((responses/total)*100) : 0;

  var locMap = {};
  ALL.forEach(function(c){
    var loc = c.location || '';
    if (loc) {
      var state = loc.indexOf(',')>-1 ? loc.split(',').pop().trim() : loc.trim();
      if (state) locMap[state] = (locMap[state]||0)+1;
    }
  });
  var topLocs = Object.entries(locMap).sort(function(a,b){return b[1]-a[1];}).slice(0,7);
  var maxLoc = topLocs.length > 0 ? topLocs[0][1] : 1;
  var locBars = topLocs.map(function(x){
    return '<div style="display:flex;align-items:center;gap:12px">'
      +'<div style="font-size:10px;color:var(--stone);min-width:36px;text-align:right">'+x[0]+'</div>'
      +'<div style="flex:1;height:24px;background:var(--cream);position:relative;overflow:hidden">'
        +'<div style="position:absolute;left:0;top:0;height:100%;width:'+Math.round((x[1]/maxLoc)*100)+'%;background:var(--gold);opacity:0.65"></div>'
        +'<div style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:var(--deep)">'+x[1]+'</div>'
      +'</div></div>';
  }).join('');

  document.getElementById('tab-stats').innerHTML =
    '<div class="sh">'
      +'<div class="sb"><div class="sbn" style="color:var(--deep)">'+total+'</div><div class="sbl">Total Outreach</div></div>'
      +'<div class="sb"><div class="sbn g">'+rr+'%</div><div class="sbl">Response Rate</div></div>'
      +'<div class="sb"><div class="sbn b">'+(counts.cs+counts.in)+'</div><div class="sbl">In Pipeline</div></div>'
      +'<div class="sb"><div class="sbn gr">'+counts.ap+'</div><div class="sbl">Active Partners</div></div>'
    +'</div>'
    +'<div class="sr2">'
      +'<div class="cc"><div class="sec-title">Conversion Funnel</div>'
        +'<div class="fr"><div class="frl"><span>Total Outreach</span><span>'+total+' (100%)</span></div><div class="fbo"><div class="fbi" style="width:100%;background:var(--stone)"></div></div></div>'
        +'<div class="fr"><div class="frl"><span>Responded</span><span>'+responses+' ('+rr+'%)</span></div><div class="fbo"><div class="fbi" style="width:'+rr+'%;background:var(--gold)"></div></div></div>'
        +'<div class="fr"><div class="frl"><span>Call Scheduled</span><span>'+counts.cs+' ('+Math.round((counts.cs/total)*100)+'%)</span></div><div class="fbo"><div class="fbi" style="width:'+Math.round((counts.cs/total)*100)+'%;background:var(--blue)"></div></div></div>'
        +'<div class="fr"><div class="frl"><span>Active Partner</span><span>'+counts.ap+' ('+Math.round((counts.ap/total)*100)+'%)</span></div><div class="fbo"><div class="fbi" style="width:'+Math.round((counts.ap/total)*100)+'%;background:var(--green)"></div></div></div>'
      +'</div>'
      +'<div class="cc"><div class="sec-title">Status Breakdown</div>'
        +'<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">'
        +[['Active Partner',counts.ap,'var(--green)'],['Call Scheduled',counts.cs,'var(--blue)'],['Interested',counts.in,'var(--gold)'],['Contacted',counts.co,'var(--stone)'],['Passed',counts.pa,'var(--red)']].map(function(x){
          return '<div style="display:flex;align-items:center;gap:10px">'
            +'<div style="width:8px;height:8px;border-radius:50%;background:'+x[2]+';flex-shrink:0"></div>'
            +'<span style="font-size:10px;flex:1">'+x[0]+'</span>'
            +'<span style="font-size:13px;font-family:Cormorant Garamond,serif;font-weight:500">'+x[1]+'</span>'
            +'<span style="font-size:9px;color:var(--stone)">'+Math.round((x[1]/total)*100)+'%</span>'
          +'</div>';
        }).join('')
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div class="cc"><div class="sec-title">Outreach by State</div><div style="display:flex;flex-direction:column;gap:9px">'+locBars+'</div></div>';
}

// ── HELPERS ─────────────────────────────────────────────────────
function switchTab(t) {
  ['overview','contacts','stats'].forEach(function(x){
    document.getElementById('tab-'+x).classList.remove('active');
    document.getElementById('btn-'+x).classList.remove('active');
  });
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('btn-'+t).classList.add('active');
  if (t === 'contacts') renderContacts();
}

function filterTable(f) { curFilter = f; renderContacts(); }
function searchTable(q) { curQ = q; renderContacts(); }

// ── INIT ─────────────────────────────────────────────────────────
document.getElementById('hdrDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
loadData();
</script>
</body>
</html>
